<!doctype html><html lang="en"><head><title>Sandip Rijal</title><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><script>// Single Page Apps for GitHub Pages

      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function (l) {
        if (l.search[1] === "/") {
          var parts = l.search.slice(1).replace(/~and~/g, "&").split("&");
          var routePath = parts.shift() || "/";
          var queryParts = parts
            .map(function (p) {
              return p.replace(/^\/+/, "");
            })
            .filter(function (p) {
              return p.length > 0;
            });

          if (routePath.length > 1 && routePath.endsWith("/")) {
            routePath = routePath.slice(0, -1);
          }

          var decoded =
            routePath + (queryParts.length ? "?" + queryParts.join("&") : "");

          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);</script><script defer="defer" src="/vendors.50610696.js"></script><script defer="defer" src="/main.74b180dc.js"></script></head><body><div id="root"></div></body></html>
